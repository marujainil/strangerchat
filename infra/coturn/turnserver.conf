# StrangerChat — coTURN (TURN/STUN) configuration
# WebRTC needs a relay for peers behind symmetric NAT/firewalls.
# Override the realm/IPs and credentials via environment in production.

# Listening
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# Public IP of the TURN server. In docker-compose this is set at runtime;
# replace with your server's public IP (or use the EXTERNAL_IP env).
# external-ip=YOUR_PUBLIC_IP

# Realm / server name
realm=strangerchat.app
server-name=strangerchat.app

# Authentication.
# For production prefer the REST/"long-term credential" mechanism with a shared
# secret so the backend can mint short-lived credentials (see backend STUN/TURN
# env + socket ICE payload). The static user below is a simple fallback.
fingerprint
lt-cred-mech
# use-auth-secret
# static-auth-secret=REPLACE_WITH_LONG_RANDOM_SECRET
user=strangerchat:please_change_me

# Quotas / hardening
total-quota=1200
bps-capacity=0
stale-nonce=600
no-multicast-peers
no-tlsv1
no-tlsv1_1

# Deny relaying to internal/loopback ranges (SSRF / LAN protection)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=::1
allowed-peer-ip=0.0.0.0-9.255.255.255

# Logging
log-file=stdout
simple-log
verbose
