# ============================================================
# Render Blueprint — backend + PostgreSQL + Redis in one click.
#
# On Render:  New +  →  Blueprint  →  connect this GitHub repo  →  Apply.
# It creates the API server, a Postgres database, and a Redis (Key Value)
# store, and wires them together. JWT secrets are auto-generated, and the
# database schema is auto-synced and seeded on first boot.
#
# After it's live, set CLIENT_URL (below) to your Netlify site URL.
# ============================================================

services:
  # ---- API: Node + Express + Socket.io (persistent WebSocket server) ----
  - type: web
    name: strangerchat-backend
    runtime: docker
    region: singapore            # closest Render region to India; change if you like
    plan: free                   # ⚠ free SPINS DOWN when idle (cold starts ~1 min,
                                 #   and idle WebSockets drop). For an always-on chat,




                                 
                                 #   change this to: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
   
    # Sync the DB schema + seed starter data (plans, countries, interests, admin)
    # on boot, then start the server. Seeding is idempotent (safe to re-run).
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: strangerchat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: strangerchat-redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true       # Render generates a secure random value
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false               # ← paste your Netlify URL here after the site is live
      - key: STUN_URLS
        value: stun:stun.l.google.com:19302
      - key: UPI_ID
        value: jainilmaru10thb@oksbi
      - key: UPI_NAME
        value: StrangerChat
      - key: FREE_FILTER_SECONDS
        value: "180"
      # ---- Optional integrations: leave blank to disable, fill to enable ----
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ---- Redis (Render "Key Value"): matchmaking queue, locks, presence, rate limits ----
  - type: keyvalue
    name: strangerchat-redis
    region: singapore
    plan: free                   # 25 MB; fine for matchmaking
    maxmemoryPolicy: noeviction  # don't evict locks/queue entries
    ipAllowList: []              # internal-only (no public access)

databases:
  # ---- PostgreSQL ----
  - name: strangerchat-db
    region: singapore
    plan: free                   # ⚠ Render's free Postgres expires after 30 days
    databaseName: strangerchat
    user: strangerchat
